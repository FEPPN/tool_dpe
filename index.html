<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget DPE - Dashboard Skeleton Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- LE BODY --- */
        body { background-color: #F4F6F8; padding: 40px 15px; margin: 0; display: flex; justify-content: center; }

        /* --- CONTENEUR GLOBAL --- */
        .widget-wrapper { width: 100%; max-width: 950px; font-family: 'Inter', system-ui, -apple-system, sans-serif; box-sizing: border-box; }
        .widget-wrapper * { box-sizing: border-box; }

        /* Charte Couleurs */
        :root {
            --papernest-blue: #0047FF; --papernest-blue-hover: #003BE0;
            --papernest-purple: #5A52FF; --papernest-light-blue: #E5EDFF;
            --pastel-peach: #FFF2E5; --text-dark: #111111; --text-light: #737373;
            --radius-box: 20px;
        }

        /* --- HERO SECTION & RECHERCHE --- */
        .hero-section {
            background: white; border-radius: var(--radius-box); padding: 32px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #EAECEF;
            border-top: 6px solid var(--papernest-blue); margin-bottom: 24px; 
            transition: padding 0.5s ease;
        }
        .hero-section h1 { font-size: 28px; font-weight: 800; color: var(--text-dark); margin: 0 0 8px 0; letter-spacing: -0.5px; }
        .hero-section p { color: var(--text-light); font-size: 15px; margin: 0 0 24px 0; }
